<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Learning Game</title>
    <link rel="stylesheet" href="static\style_game.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style_index.css') }}">
</head>
<body>
    <!-- Login Screen -->
    <div class="container">
        <nav class="navigation">
            <a href="{{ url_for('index') }}" class="nav-link active">Dashboard</a>
            <a href="{{ url_for('translator_page') }}" class="nav-link">Translator</a>
            <a href="{{ url_for('game_page') }}" class="nav-link">Word Game</a>
        </nav>
        <div id="login-screen" class="screen">
            <div class="login-container">
                <h1>LinguaVerse</h1>
                <form id="login-form">
                    <div class="form-group">
                        <label for="username">Username:</label>
                        <input type="text" id="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password:</label>
                        <input type="password" id="password" required>
                     </div>
                    <div class="form-buttons">
                        <button type="submit" id="login-btn">Login</button>
                        <button type="button" id="register-btn">Register</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <!-- Game Menu Screen -->
    <div id="game-menu" class="screen hidden">
        <div class="menu-container">
            <h1>Language Learning Game</h1>
            <div class="menu-options">
                <button id="play-btn">Play Game</button>
                <button id="leaderboard-btn">Leaderboard</button>
                <button id="logout-btn">Logout</button>
            </div>
            <div id="level-selection" class="hidden">
                <h2>Select Level</h2>
                <div class="level-buttons">
                    <button class="level-btn" data-level="1">Level 1</button>
                    <button class="level-btn" data-level="2">Level 2</button>
                    <button class="level-btn" data-level="3">Level 3</button>
                    <button class="level-btn" data-level="4">Level 4</button>
                    <button class="level-btn" data-level="5">Level 5</button>
                </div>
                <div id="language-selector">
                    <label for="language-select">Choose a language:</label>
                    <select id="language-select">
                        <option value="spanish">Spanish</option>
                        <option value="french">French</option>
                        <option value="german">German</option>
                        <option value="italian">Italian</option>
                        <option value="japanese">Japanese</option>
                        <option value="chinese">Chinese</option>
                    </select>
                </div>
                <button id="start-game-btn">Start Game</button>
                <button id="back-to-menu-btn">Back to Menu</button>
            </div>
        </div>
    </div>

    <!-- Leaderboard Screen -->
    <div id="leaderboard-screen" class="screen hidden">
        <div class="leaderboard-container">
            <h1>Leaderboard</h1>
            <div class="filter-options">
                <select id="language-filter">
                    <option value="all">All Languages</option>
                    <option value="spanish">Spanish</option>
                    <option value="french">French</option>
                    <option value="german">German</option>
                    <option value="italian">Italian</option>
                    <option value="japanese">Japanese</option>
                    <option value="chinese">Chinese</option>
                </select>
                <select id="level-filter">
                    <option value="all">All Levels</option>
                    <option value="1">Level 1</option>
                    <option value="2">Level 2</option>
                    <option value="3">Level 3</option>
                    <option value="4">Level 4</option>
                    <option value="5">Level 5</option>
                </select>
            </div>
            <div class="leaderboard-table">
                <table>
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Username</th>
                            <th>Language</th>
                            <th>Level</th>
                            <th>Score</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-data">
                        <!-- Leaderboard entries will be inserted here -->
                    </tbody>
                </table>
            </div>
            <button id="back-from-leaderboard">Back to Menu</button>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen hidden">
        <div class="container">
            <header>
                <h1>Language Learning Game</h1>
                <div class="level-info">
                    <span id="current-level">Level 1</span>
                    <span id="current-language">Spanish</span>
                </div>
                <div class="score-container">
                    <div class="hearts">
                        <span class="heart">❤️</span>
                        <span class="heart">❤️</span>
                        <span class="heart">❤️</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress"></div>
                    </div>
                    <div class="score-display">
                        Score: <span id="score-value">0</span>
                    </div>
                </div>
            </header>
            
            <main>
                <div class="game-area">
                    <div id="question-container">
                        <p id="instruction">Translate this sentence</p>
                        <h2 id="question">Loading question...</h2>
                    </div>
                    
                    <div id="options-container" class="hidden">
                        <!-- Options will be inserted here by JavaScript -->
                    </div>
                    
                    <div id="word-bank-container" class="hidden">
                        <!-- Word bank pieces will be inserted here by JavaScript -->
                    </div>
                    
                    <div id="answer-container" class="hidden">
                        <!-- Selected words will appear here -->
                    </div>
                </div>
                
                <div id="feedback-container" class="hidden">
                    <div id="correct-feedback" class="feedback hidden">
                        <h3>Correct!</h3>
                        <p id="correct-answer"></p>
                    </div>
                    <div id="incorrect-feedback" class="feedback hidden">
                        <h3>Not quite right</h3>
                        <p id="correct-solution"></p>
                    </div>
                    <button id="continue-btn">Continue</button>
                </div>
            </main>
        </div>
    </div>
    
    <script src="static\game.js"></script>
</body>
</html>
